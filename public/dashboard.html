<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <div class="page" style="align-items:flex-start;">
    <div class="dashboard-shell">
      <div class="navbar">
        <div class="store-brand-inline">
          <img id="storeLogoHeader" class="store-header-logo hidden" alt="โลโก้ร้าน" />
          <div>
            <div class="small-note" id="welcomeText">สวัสดี</div>
            <h1 class="title" style="margin:0;" id="storeHeadline">ระบบบัญชี</h1>
          </div>
        </div>
        <div class="nav-actions">
          <a class="btn btn-ghost" href="/reports">รายงาน</a>
          <a class="btn btn-ghost" href="/profile">โปรไฟล์ร้าน</a>
          <button class="btn btn-primary" id="logoutBtn">ออกจากระบบ</button>
        </div>
      </div>

      <div id="toast" class="toast"></div>
      <div class="summary-grid">
        <div class="summary-card"><div class="summary-label">รายรับรวม</div><div id="totalIncome" class="summary-value">฿0</div></div>
        <div class="summary-card"><div class="summary-label">ค่าใช้จ่ายรวม</div><div id="totalExpense" class="summary-value">฿0</div></div>
        <div class="summary-card"><div class="summary-label">กำไรรวม</div><div id="totalProfit" class="summary-value">฿0</div></div>
        <div class="summary-card"><div class="summary-label">จำนวนรายการ</div><div id="totalCount" class="summary-value">0</div></div>
      </div>

      <div class="dashboard-grid">
        <section class="glass panel">
          <h2 class="section-title">ระบบบัญชี</h2>
          <p class="section-subtitle">เพิ่มข้อมูลรายรับหรือรายจ่าย พร้อมคำนวณให้อัตโนมัติ</p>
          <form id="transactionForm" class="form-grid">
            <div class="input-wrap"><label>วันที่</label><input id="date" type="date" name="date" required /></div>
            <div class="input-wrap"><label>รายการ</label><input id="itemName" type="text" name="itemName" placeholder="เช่น เสื้อยืด" required /></div>
            <div class="input-wrap"><label>จำนวน</label><input id="quantity" type="number" min="0" step="1" name="quantity" placeholder="1" /></div>
            <div class="input-wrap"><label>ราคา</label><input id="price" type="number" min="0" step="0.01" name="price" placeholder="0" /></div>
            <div class="input-wrap"><label>ค่าใช้จ่าย</label><input id="expense" type="number" min="0" step="0.01" name="expense" placeholder="0" /></div>
            <div class="input-wrap"><label>หมายเหตุ</label><input id="note" type="text" name="note" placeholder="เช่น ค่าขนส่ง / แหล่งที่มา" /></div>
            <div class="input-wrap"><label>ประเภท</label><select id="type" name="type"><option value="income">รายรับ</option><option value="expense">รายจ่าย</option></select></div>
            <button class="btn btn-primary" id="submitBtn" type="submit">เพิ่มข้อมูล</button>
          </form>
        </section>

        <section class="glass panel">
          <h2 class="section-title">รายการย้อนหลัง</h2>
          <p class="section-subtitle">ดู แก้ไข หรือลบรายการได้จากตารางนี้</p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>วันที่</th>
                  <th>รายการ</th>
                  <th>จำนวน</th>
                  <th>ราคา</th>
                  <th>ค่าใช้จ่าย</th>
                  <th>กำไร</th>
                  <th>ประเภท</th>
                  <th>จัดการ</th>
                </tr>
              </thead>
              <tbody id="transactionBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script src="/public/js/common.js"></script>
  <script src="/public/js/dashboard.js"></script>
</body>
</html>
